storage:
  root: ~/.ciq/envs/ciq-engram
  backends:
    postgres_db:
      type: postgresql
      connection_string: postgresql://ciq:ciq_secret@localhost:5432/cognitive_iq
      pool_size: 10
      table_prefix: engram_
  vector_backend: postgres_db
  graph_backend: postgres_db
  events_backend: postgres_db
  file_tracker_backend_v2: postgres_db
embeddings:
  default_provider: sentence_transformer
  default_dimensions: 384
mcp:
  enabled: true
  api:
    enabled: true
    host: 127.0.0.1
    port: 8000
services:
  auto_start_proxy: false
