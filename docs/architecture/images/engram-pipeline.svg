<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 760" width="1320" height="760" role="img" aria-label="Engram architecture: build path, retrieve path, consolidation loop">
  <title>Engram — agentic memory &amp; knowledge architecture</title>
  <desc>Two-row architecture in the style of an academic figure. Top row (build path): Input &amp; Ingest → Memory &amp; Knowledge Construction → Durable Store, with a Consolidation feedback module. Bottom row (retrieve path): Context Packet ← Retrieval Composition, reading from the store. A governance band spans all reads and writes.</desc>

  <rect x="0" y="0" width="1320" height="760" fill="#FFFFFF"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" text-rendering="geometricPrecision">

    <!-- title -->
    <text x="660" y="36" text-anchor="middle" fill="#0F172A" font-size="23" font-weight="700">Engram — agentic memory &amp; knowledge, for decisions</text>
    <text x="660" y="60" text-anchor="middle" fill="#64748B" font-size="13">Top: build &amp; store the memory/knowledge/belief substrate. Bottom: fuse it into a governed context packet. Consolidation maintains the store; governance spans every read &amp; write.</text>

    <!-- row captions -->
    <text x="40" y="84" fill="#94A3B8" font-size="11" font-weight="700" letter-spacing="1.2">BUILD / STORE PATH</text>
    <text x="40" y="400" fill="#94A3B8" font-size="11" font-weight="700" letter-spacing="1.2">RETRIEVE / DECIDE PATH</text>

    <!-- ================= TOP ROW ================= -->

    <!-- ① INPUT & INGEST -->
    <rect x="40" y="94" width="286" height="214" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="56" y="120" fill="#2563EB" font-size="13.5" font-weight="700">① INPUT &amp; INGEST</text>
    <g>
      <rect x="56" y="138" width="254" height="24" rx="6" fill="#EFF6FF"/><text x="68" y="154" fill="#334155" font-size="11.5">Documents</text>
      <rect x="56" y="170" width="254" height="24" rx="6" fill="#EFF6FF"/><text x="68" y="186" fill="#334155" font-size="11.5">Code / repositories</text>
      <rect x="56" y="202" width="254" height="24" rx="6" fill="#EFF6FF"/><text x="68" y="218" fill="#334155" font-size="11.5">Agent observations</text>
      <rect x="56" y="234" width="254" height="24" rx="6" fill="#EFF6FF"/><text x="68" y="250" fill="#334155" font-size="11.5">Tables · logs</text>
    </g>
    <text x="56" y="288" fill="#64748B" font-size="11" font-style="italic">extract → chunk → embed</text>

    <!-- ② CONSTRUCTION -->
    <rect x="398" y="94" width="322" height="214" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="414" y="120" fill="#7C3AED" font-size="13.5" font-weight="700">② MEMORY &amp; KNOWLEDGE CONSTRUCTION</text>
    <g>
      <rect x="414" y="138" width="290" height="24" rx="6" fill="#F5F3FF"/><text x="426" y="154" fill="#334155" font-size="11.5">MemoryRecord (lifecycle)</text>
      <rect x="414" y="170" width="290" height="24" rx="6" fill="#F5F3FF"/><text x="426" y="186" fill="#334155" font-size="11.5">KnowledgeChunk</text>
      <rect x="414" y="202" width="290" height="24" rx="6" fill="#F5F3FF"/><text x="426" y="218" fill="#334155" font-size="11.5">Entity / Relationship</text>
      <rect x="414" y="234" width="290" height="24" rx="6" fill="#F5F3FF"/><text x="426" y="250" fill="#334155" font-size="11.5">Taxonomy · Ontology</text>
    </g>
    <text x="414" y="288" fill="#64748B" font-size="11" font-style="italic">source-grounded, never free-floating</text>

    <!-- ③ DURABLE STORE -->
    <rect x="792" y="94" width="286" height="214" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="808" y="120" fill="#4F46E5" font-size="13.5" font-weight="700">③ DURABLE STORE</text>
    <g>
      <rect x="808" y="138" width="254" height="24" rx="6" fill="#EEF2FF"/><text x="820" y="154" fill="#334155" font-size="11.5">Knowledge graph</text>
      <rect x="808" y="170" width="254" height="24" rx="6" fill="#EEF2FF"/><text x="820" y="186" fill="#334155" font-size="11.5">Belief (bi-temporal)</text>
      <rect x="808" y="202" width="254" height="24" rx="6" fill="#EEF2FF"/><text x="820" y="218" fill="#334155" font-size="11.5">Hierarchy</text>
      <rect x="808" y="234" width="254" height="24" rx="6" fill="#EEF2FF"/><text x="820" y="250" fill="#334155" font-size="11.5">Vector index</text>
    </g>
    <text x="808" y="288" fill="#64748B" font-size="11" font-style="italic">sqlite ⇄ surreal (swap by config)</text>

    <!-- ⑥ CONSOLIDATION (feedback module) -->
    <rect x="1148" y="94" width="140" height="214" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="1162" y="120" fill="#D97706" font-size="12.5" font-weight="700">CONSOLIDATION</text>
    <g>
      <rect x="1162" y="138" width="112" height="24" rx="6" fill="#FFFBEB"/><text x="1172" y="154" fill="#334155" font-size="11">reflection</text>
      <rect x="1162" y="170" width="112" height="24" rx="6" fill="#FFFBEB"/><text x="1172" y="186" fill="#334155" font-size="11">decay curve</text>
      <rect x="1162" y="202" width="112" height="24" rx="6" fill="#FFFBEB"/><text x="1172" y="218" fill="#334155" font-size="11">taxonomy evolution</text>
    </g>
    <text x="1162" y="252" fill="#64748B" font-size="10.5" font-style="italic">offline pipeline</text>

    <!-- top-row arrows -->
    <g fill="#475569">
      <line x1="326" y1="201" x2="389" y2="201" stroke="#475569" stroke-width="1.6"/>
      <polygon points="380,196 392,201 380,206"/>
      <line x1="720" y1="201" x2="783" y2="201" stroke="#475569" stroke-width="1.6"/>
      <polygon points="774,196 786,201 774,206"/>
    </g>
    <!-- ③ ⇄ ⑥ consolidation feedback -->
    <g fill="#D97706">
      <line x1="1078" y1="195" x2="1145" y2="195" stroke="#D97706" stroke-width="1.6"/>
      <polygon points="1136,190 1148,195 1136,200"/>
      <line x1="1145" y1="208" x2="1078" y2="208" stroke="#D97706" stroke-width="1.6"/>
      <polygon points="1087,203 1075,208 1087,213"/>
    </g>
    <text x="1112" y="184" text-anchor="middle" fill="#D97706" font-size="10" font-weight="600">update</text>

    <!-- ③ ↓ ④  (store feeds retrieval) -->
    <g fill="#475569">
      <line x1="935" y1="308" x2="935" y2="401" stroke="#475569" stroke-width="1.6"/>
      <polygon points="930,392 935,404 940,392"/>
    </g>
    <text x="950" y="358" fill="#64748B" font-size="11" font-style="italic">retrieve</text>

    <!-- ================= BOTTOM ROW ================= -->

    <!-- ⑤ CONTEXT PACKET (bottom-left) -->
    <rect x="40" y="410" width="286" height="214" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="56" y="436" fill="#0891B2" font-size="13.5" font-weight="700">⑤ CONTEXT PACKET</text>
    <g>
      <rect x="56" y="454" width="254" height="24" rx="6" fill="#ECFEFF"/><text x="68" y="470" fill="#334155" font-size="11.5">ranked · fused · capped</text>
      <rect x="56" y="486" width="254" height="24" rx="6" fill="#ECFEFF"/><text x="68" y="502" fill="#334155" font-size="11.5">provenance + explanations</text>
      <rect x="56" y="518" width="254" height="24" rx="6" fill="#ECFEFF"/><text x="68" y="534" fill="#334155" font-size="11.5">policy-filtered</text>
      <rect x="56" y="550" width="254" height="24" rx="6" fill="#ECFEFF"/><text x="68" y="566" fill="#334155" font-size="11.5">→ agent decision</text>
    </g>
    <text x="56" y="604" fill="#64748B" font-size="11" font-style="italic">governed recall</text>

    <!-- ④ RETRIEVAL COMPOSITION (bottom-right, under store) -->
    <rect x="792" y="410" width="286" height="214" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="808" y="436" fill="#059669" font-size="13.5" font-weight="700">④ RETRIEVAL COMPOSITION</text>
    <g>
      <rect x="808" y="454" width="254" height="24" rx="6" fill="#ECFDF5"/><text x="820" y="470" fill="#334155" font-size="11.5">graph · lexical · vector</text>
      <rect x="808" y="486" width="254" height="24" rx="6" fill="#ECFDF5"/><text x="820" y="502" fill="#334155" font-size="11.5">cue · beliefs</text>
      <rect x="808" y="518" width="254" height="24" rx="6" fill="#ECFDF5"/><text x="820" y="534" fill="#334155" font-size="11.5">RRF fusion</text>
      <rect x="808" y="550" width="254" height="24" rx="6" fill="#ECFDF5"/><text x="820" y="566" fill="#334155" font-size="11.5">cross-encoder rerank</text>
    </g>
    <text x="808" y="604" fill="#64748B" font-size="11" font-style="italic">six modes, fused</text>

    <!-- ④ → ⑤ (retrieve produces context; right-to-left) -->
    <g fill="#475569">
      <line x1="792" y1="517" x2="333" y2="517" stroke="#475569" stroke-width="1.6"/>
      <polygon points="342,512 330,517 342,522"/>
    </g>
    <text x="560" y="510" text-anchor="middle" fill="#64748B" font-size="11" font-style="italic">fused result</text>

    <!-- ⑤ ↑ ① (context returns to agent → new writes; left side) -->
    <g fill="#475569">
      <line x1="183" y1="410" x2="183" y2="315" stroke="#475569" stroke-width="1.6"/>
      <polygon points="178,324 183,312 188,324"/>
    </g>
    <text x="198" y="366" fill="#64748B" font-size="11" font-style="italic">context → agent</text>

    <!-- ================= GOVERNANCE BAND ================= -->
    <rect x="40" y="672" width="1248" height="52" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="660" y="703" text-anchor="middle" font-size="13"><tspan fill="#0F172A" font-weight="700">GOVERNANCE</tspan><tspan fill="#475569">  —  policy · provenance · scope · sensitivity · retention  —  enforced on every read &amp; write</tspan></text>

  </g>
</svg>
