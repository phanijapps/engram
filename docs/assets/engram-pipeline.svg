<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 740" width="1320" height="740" role="img" aria-label="Engram architecture: build path (one-way), retrieve path (bidirectional)">
  <title>Engram — agentic memory &amp; knowledge architecture</title>
  <desc>External Agent/Consumer on the left. Top (build, one-way): Ingest → Construction → Durable Store, with a Consolidation feedback module. Bottom (retrieve, bidirectional): Agent ↔ Context Path ↔ Retrieve ↔ Store. Governance spans every read and write.</desc>

  <rect x="0" y="0" width="1320" height="740" fill="#FFFFFF"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" text-rendering="geometricPrecision">

    <text x="660" y="34" text-anchor="middle" fill="#0F172A" font-size="23" font-weight="700">Engram — agentic memory &amp; knowledge, for decisions</text>
    <text x="660" y="58" text-anchor="middle" fill="#64748B" font-size="13">Top: build &amp; store (one-way writes). Bottom: retrieve is bidirectional — agent ↔ context path ↔ retrieve ↔ store. Consolidation maintains the store; governance spans all.</text>

    <text x="120" y="86" fill="#94A3B8" font-size="11" font-weight="700" letter-spacing="1.2">BUILD / STORE PATH</text>
    <text x="120" y="406" fill="#94A3B8" font-size="11" font-weight="700" letter-spacing="1.2">RETRIEVE PATH  (bidirectional)</text>

    <!-- ============ AGENT / CONSUMER (external, far left) ============ -->
    <rect x="24" y="96" width="64" height="534" rx="12" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
    <text transform="rotate(-90 56 363)" x="56" y="363" text-anchor="middle" fill="#0F172A" font-size="14" font-weight="700" letter-spacing="0.5">AGENT / CONSUMER</text>

    <!-- ============ TOP ROW (build, one-way) ============ -->

    <!-- ① INPUT & INGEST -->
    <rect x="120" y="96" width="284" height="210" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="136" y="120" fill="#2563EB" font-size="13.5" font-weight="700">① INPUT &amp; INGEST</text>
    <g>
      <rect x="136" y="140" width="252" height="24" rx="6" fill="#EFF6FF"/><text x="148" y="156" fill="#334155" font-size="11.5">Documents</text>
      <rect x="136" y="172" width="252" height="24" rx="6" fill="#EFF6FF"/><text x="148" y="188" fill="#334155" font-size="11.5">Code / repositories</text>
      <rect x="136" y="204" width="252" height="24" rx="6" fill="#EFF6FF"/><text x="148" y="220" fill="#334155" font-size="11.5">Agent observations</text>
      <rect x="136" y="236" width="252" height="24" rx="6" fill="#EFF6FF"/><text x="148" y="252" fill="#334155" font-size="11.5">Tables · logs</text>
    </g>
    <text x="136" y="288" fill="#64748B" font-size="11" font-style="italic">extract → chunk → embed</text>

    <!-- ② CONSTRUCTION -->
    <rect x="444" y="96" width="316" height="210" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="460" y="120" fill="#7C3AED" font-size="13.5" font-weight="700">② CONSTRUCTION</text>
    <g>
      <rect x="460" y="140" width="284" height="24" rx="6" fill="#F5F3FF"/><text x="472" y="156" fill="#334155" font-size="11.5">MemoryRecord (lifecycle)</text>
      <rect x="460" y="172" width="284" height="24" rx="6" fill="#F5F3FF"/><text x="472" y="188" fill="#334155" font-size="11.5">KnowledgeChunk</text>
      <rect x="460" y="204" width="284" height="24" rx="6" fill="#F5F3FF"/><text x="472" y="220" fill="#334155" font-size="11.5">Entity / Relationship</text>
      <rect x="460" y="236" width="284" height="24" rx="6" fill="#F5F3FF"/><text x="472" y="252" fill="#334155" font-size="11.5">Taxonomy · Ontology</text>
    </g>
    <text x="460" y="288" fill="#64748B" font-size="11" font-style="italic">source-grounded, never free-floating</text>

    <!-- ③ DURABLE STORE -->
    <rect x="800" y="96" width="284" height="210" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="816" y="120" fill="#4F46E5" font-size="13.5" font-weight="700">③ DURABLE STORE</text>
    <g>
      <rect x="816" y="140" width="252" height="24" rx="6" fill="#EEF2FF"/><text x="828" y="156" fill="#334155" font-size="11.5">Knowledge graph</text>
      <rect x="816" y="172" width="252" height="24" rx="6" fill="#EEF2FF"/><text x="828" y="188" fill="#334155" font-size="11.5">Belief (bi-temporal)</text>
      <rect x="816" y="204" width="252" height="24" rx="6" fill="#EEF2FF"/><text x="828" y="220" fill="#334155" font-size="11.5">Hierarchy</text>
      <rect x="816" y="236" width="252" height="24" rx="6" fill="#EEF2FF"/><text x="828" y="252" fill="#334155" font-size="11.5">Vector index</text>
    </g>
    <text x="816" y="288" fill="#64748B" font-size="11" font-style="italic">sqlite ⇄ surreal (swap by config)</text>

    <!-- ⑥ CONSOLIDATION (feedback) -->
    <rect x="1124" y="96" width="172" height="210" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="1140" y="120" fill="#D97706" font-size="12.5" font-weight="700">CONSOLIDATION</text>
    <g>
      <rect x="1140" y="140" width="140" height="24" rx="6" fill="#FFFBEB"/><text x="1150" y="156" fill="#334155" font-size="11">reflection</text>
      <rect x="1140" y="172" width="140" height="24" rx="6" fill="#FFFBEB"/><text x="1150" y="188" fill="#334155" font-size="11">decay curve</text>
      <rect x="1140" y="204" width="140" height="24" rx="6" fill="#FFFBEB"/><text x="1150" y="220" fill="#334155" font-size="11">taxonomy evolution</text>
    </g>
    <text x="1140" y="252" fill="#64748B" font-size="10.5" font-style="italic">offline pipeline</text>

    <!-- top arrows -->
    <g fill="#475569">
      <line x1="88" y1="201" x2="114" y2="201" stroke="#475569" stroke-width="1.6"/>
      <polygon points="108,196 120,201 108,206"/>
      <line x1="404" y1="201" x2="438" y2="201" stroke="#475569" stroke-width="1.6"/>
      <polygon points="432,196 444,201 432,206"/>
      <line x1="760" y1="201" x2="794" y2="201" stroke="#475569" stroke-width="1.6"/>
      <polygon points="788,196 800,201 788,206"/>
    </g>
    <text x="104" y="193" text-anchor="middle" fill="#64748B" font-size="10" font-style="italic">writes</text>

    <!-- ③ ⇄ ⑥ consolidation feedback (bidirectional) -->
    <g fill="#D97706">
      <line x1="1084" y1="195" x2="1118" y2="195" stroke="#D97706" stroke-width="1.6"/>
      <polygon points="1112,190 1124,195 1112,200"/>
      <line x1="1124" y1="208" x2="1090" y2="208" stroke="#D97706" stroke-width="1.6"/>
      <polygon points="1096,203 1084,208 1096,213"/>
    </g>
    <text x="1104" y="184" text-anchor="middle" fill="#D97706" font-size="10" font-weight="600">update</text>

    <!-- ============ BOTTOM ROW (retrieve, bidirectional) ============ -->

    <!-- ⑤ CONTEXT PATH -->
    <rect x="120" y="420" width="284" height="210" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="136" y="444" fill="#0891B2" font-size="13.5" font-weight="700">⑤ CONTEXT PATH</text>
    <g>
      <rect x="136" y="464" width="252" height="24" rx="6" fill="#ECFEFF"/><text x="148" y="480" fill="#334155" font-size="11.5">unified recall</text>
      <rect x="136" y="496" width="252" height="24" rx="6" fill="#ECFEFF"/><text x="148" y="512" fill="#334155" font-size="11.5">RRF fusion</text>
      <rect x="136" y="528" width="252" height="24" rx="6" fill="#ECFEFF"/><text x="148" y="544" fill="#334155" font-size="11.5">cross-encoder rerank</text>
      <rect x="136" y="560" width="252" height="24" rx="6" fill="#ECFEFF"/><text x="148" y="576" fill="#334155" font-size="11.5">context packet</text>
    </g>
    <text x="136" y="612" fill="#64748B" font-size="11" font-style="italic">agent recall channel</text>

    <!-- ④ RETRIEVE -->
    <rect x="800" y="420" width="284" height="210" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="816" y="444" fill="#059669" font-size="13.5" font-weight="700">④ RETRIEVE</text>
    <g>
      <rect x="816" y="464" width="252" height="24" rx="6" fill="#ECFDF5"/><text x="828" y="480" fill="#334155" font-size="11.5">graph</text>
      <rect x="816" y="496" width="252" height="24" rx="6" fill="#ECFDF5"/><text x="828" y="512" fill="#334155" font-size="11.5">lexical</text>
      <rect x="816" y="528" width="252" height="24" rx="6" fill="#ECFDF5"/><text x="828" y="544" fill="#334155" font-size="11.5">vector</text>
      <rect x="816" y="560" width="252" height="24" rx="6" fill="#ECFDF5"/><text x="828" y="576" fill="#334155" font-size="11.5">cue · beliefs</text>
    </g>
    <text x="816" y="612" fill="#64748B" font-size="11" font-style="italic">six retrieval modes</text>

    <!-- AGENT ↔ ⑤ (bidirectional) -->
    <g fill="#475569">
      <line x1="88" y1="525" x2="120" y2="525" stroke="#475569" stroke-width="1.6"/>
      <polygon points="94,520 88,525 94,530"/>
      <polygon points="114,520 120,525 114,530"/>
    </g>
    <text x="104" y="517" text-anchor="middle" fill="#64748B" font-size="10" font-style="italic">recall</text>

    <!-- ⑤ ↔ ④ (bidirectional) -->
    <g fill="#475569">
      <line x1="404" y1="525" x2="800" y2="525" stroke="#475569" stroke-width="1.6"/>
      <polygon points="410,520 404,525 410,530"/>
      <polygon points="794,520 800,525 794,530"/>
    </g>
    <text x="602" y="517" text-anchor="middle" fill="#64748B" font-size="11" font-style="italic">fan out / fuse</text>

    <!-- ④ ↔ ③ (bidirectional: retrieve queries store, store returns) -->
    <g fill="#475569">
      <line x1="942" y1="306" x2="942" y2="420" stroke="#475569" stroke-width="1.6"/>
      <polygon points="937,312 942,306 947,312"/>
      <polygon points="937,414 942,420 947,414"/>
    </g>
    <text x="958" y="366" fill="#64748B" font-size="11" font-style="italic">query / results</text>

    <!-- ============ GOVERNANCE BAND ============ -->
    <rect x="24" y="660" width="1272" height="52" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="660" y="691" text-anchor="middle" font-size="13"><tspan fill="#0F172A" font-weight="700">GOVERNANCE</tspan><tspan fill="#475569">  —  policy · provenance · scope · sensitivity · retention  —  enforced on every read &amp; write</tspan></text>

  </g>
</svg>
